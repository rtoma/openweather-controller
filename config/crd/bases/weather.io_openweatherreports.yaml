---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: openweatherreports.weather.io
spec:
  group: weather.io
  names:
    kind: OpenWeatherReport
    listKind: OpenWeatherReportList
    plural: openweatherreports
    singular: openweatherreport
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.location
      name: Location
      type: string
    - jsonPath: .status.temperature
      name: Temperature
      type: string
    - jsonPath: .status.humidity
      name: Humidity
      type: string
    - jsonPath: .status.status
      name: Status
      type: string
    - jsonPath: .status.lastUpdated
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: OpenWeatherReport is the Schema for the openweatherreports API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of OpenWeatherReport
            properties:
              city:
                description: city is the name of the city to get weather for.
                minLength: 1
                type: string
              country:
                description: country is the ISO 3166-1 alpha-2 country code (e.g.
                  "NL").
                maxLength: 2
                minLength: 2
