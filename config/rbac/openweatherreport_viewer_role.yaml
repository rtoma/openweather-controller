# This rule is not used by the project openweather-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to weather.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: openweather-controller
    app.kubernetes.io/managed-by: kustomize
  name: openweatherreport-viewer-role
rules:
- apiGroups:
  - weather.io
  resources:
  - openweatherreports
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - weather.io
  resources:
  - openweatherreports/status
  verbs:
  - get
