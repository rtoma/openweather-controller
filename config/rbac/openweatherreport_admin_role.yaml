# This rule is not used by the project openweather-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over weather.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: openweather-controller
    app.kubernetes.io/managed-by: kustomize
  name: openweatherreport-admin-role
rules:
- apiGroups:
  - weather.io
  resources:
  - openweatherreports
  verbs:
  - '*'
- apiGroups:
  - weather.io
  resources:
  - openweatherreports/status
  verbs:
  - get
