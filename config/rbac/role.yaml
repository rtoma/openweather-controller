---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - weather.io
  resources:
  - openweatherreports
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - weather.io
  resources:
  - openweatherreports/finalizers
  verbs:
  - update
- apiGroups:
  - weather.io
  resources:
  - openweatherreports/status
  verbs:
  - get
  - patch
  - update
