# Secret holding the OpenWeather API key.
# Replace the placeholder value before applying, or delete this file and
# create the Secret manually:
#
#   kubectl create secret generic openweather-controller-openweather-api-key \
#     --from-literal=api-key=<YOUR_API_KEY> \
#     -n openweather-controller-system
#
apiVersion: v1
kind: Secret
metadata:
  name: openweather-api-key
  namespace: system
type: Opaque
stringData:
  api-key: "REPLACE_WITH_YOUR_OPENWEATHER_API_KEY"
